name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 20 * * *'   # 8pm UTC = 8am NZST — daily rebuild for new blog posts

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_WORKER_URL: ${{ secrets.PUBLIC_WORKER_URL }}

      - name: Push dist branch
        run: |
          cd dist
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:dist

      - name: Trigger Plesk pull
        run: curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PLESK_DEPLOY_WEBHOOK }}"
