title: Stump Grinding
description: "Stumps left after tree removal are a hazard, an eyesore, and a source of ongoing pest problems. Grinding removes the stump below ground level so the area can be replanted or paved over. Note: stump removal is quoted separately from tree removal — if you want the stump gone, say so at the time of quoting so it's included in the written scope."
detail: "Includes: grinding to below grade, removal of debris and grindings, optional backfilling with topsoil ready for replanting."
order: 4
