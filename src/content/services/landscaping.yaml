title: Landscaping
description: "Landscaping at ImpressioNZ means practical outdoor spaces that look good and hold up over time — not Instagram gardens that need constant attention. Rod works on paths, terracing, garden bed edging, retaining walls, and the structural elements that frame planting. Everything is quoted in writing before work starts, scoped to what you actually need."
detail: "Includes: site assessment and planning, earthworks and levelling, path and paving installation, retaining and edging work, garden bed creation."
order: 3
