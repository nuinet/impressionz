title: Tree removal and pruning
description: "Overgrown, dead, or poorly positioned trees cause real problems — blocked light, damage to fences, lifted paths, and risk in a storm. Rod handles removal and pruning for trees at residential scale, including cleanup and disposal of all material. Root removal must be specified separately and quoted accordingly — it significantly increases the scope of work."
detail: "Includes: safe felling or selective pruning, branch and debris removal, stump grinding (quoted separately), advice on replacement planting."
order: 5
