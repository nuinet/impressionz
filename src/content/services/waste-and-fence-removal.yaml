title: Waste and Fence removal
description: "Green waste, old fencing, overgrown hedgerow offcuts — it builds up fast and disposal isn't straightforward. Rod removes organic garden waste and old timber fencing as part of a wider job or as a standalone clearance. Important: waste removal is quoted based on what is visible at the time. Additional waste that appears during the job (hidden beneath growth, behind structures) is not included in the original quote — a variation will be raised."
detail: "Includes: removal of green waste and garden debris, old timber fence removal, load and disposal. Green waste only — no treated timber, concrete, or household waste."
order: 8
