title: Planting
description: "Good planting starts with knowing what will actually survive and thrive in your specific conditions — soil type, drainage, sun exposure, and how much maintenance you want to do later. Rod selects species that suit your environment rather than just what looks nice in a pot. That means healthier plants, less replacement cost, and a garden that fills in properly over time rather than thinning out after the first summer."
detail: "Includes: species selection and advice, supply of plants (or planting client-supplied stock), bed preparation, mulching, initial watering setup."
order: 1
