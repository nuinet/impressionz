heroTitle: 'Domestic Garden and public spaces - from private gardens to stormwater ponds '
heroSubtitle: >-
  Transforming your outdoor spaces into beautiful gardens for over 10 years. 
  Transform public spaces integrated with ponds {stormwater, recreational etc.)
  100+ satisfied clients.
aboutBody: >-
  If your outdoor space is getting out of hand—whether maintenance is
  overwhelming or it's overdue for a big cleanup—we work with you to make things
  right. We specialize in transforming neglected gardens, public spaces shared
  by home owners such as stormwater ponds that need a cleaner water flow, thus
  increasing property value. We develop healthy ecology spaces and create places
  you'll love to spend time, free of pest plants and other unwanted or noxious
  species.


  Our expertise covers plant choice, maintenance, and planting—grass, hedges, or
  gardens. We can work with what you have, introduce new elements, and clear all
  forms of waste, including build up of sediment in ponds. We document our work
  and deliver expert reports to the right authorities, ensure all parties have
  records. We clarify your expectations clearly before starting. Every client
  gets the price promised—no surprise charges. Servicing the whole of Auckland
  for large jobs.
ctaHeading: >-
  Are you ready for a Garden Transformation? A shared urban public space such as
  stormwater ponds cleared out?
