items:
  - heading: Scope of work
    body: "Only the items listed in the written quotation are included in the agreed price. Additional work requested during the job will be quoted separately before being undertaken."
  - heading: Property access
    body: "The client must ensure clear access to the work area before the job commences. This includes removing vehicles, unlocking gates, and clearing any obstacles not mentioned in the quote. Delays caused by access issues may affect scheduling."
  - heading: Waste removal
    body: "Waste removal pricing is based on the volume of waste visible at the time of quoting. Only green/organic garden waste is included unless otherwise specified. Domestic waste, treated timber, concrete, and soil are excluded unless explicitly quoted. Additional waste discovered during the job will be quoted as a variation."
  - heading: Hedges and elevated viewing
    body: "Standard trimming produces a tidy result from ground level. If a hedge or structure is visible from above (balcony, raised deck, neighbour's elevated property) and a perfect finish is required from that angle, this must be stated at quoting. This adds to the cost and time required."
  - heading: Ownership of products
    body: "All plants, materials, and products supplied by ImpressioNZ Outdoors remain our property until full payment has been received."
  - heading: Underground services
    body: "The client is responsible for identifying and communicating the location of all underground cables, pipes, irrigation lines, and drainage infrastructure before work begins. ImpressioNZ Outdoors accepts no liability for damage to services that were not disclosed."
  - heading: Tree and large plant removal
    body: "Stump removal is quoted and priced separately from tree removal. Root removal must be explicitly specified — it is not included by default. Where roots affect paving, structures, or drainage, a site assessment prior to quoting is required."
  - heading: Authority and ownership
    body: "By accepting a quote and proceeding with work, the client confirms that they are the property owner or have written authority from the property owner to commission the work."
  - heading: Weed spraying
    body: "Weed spraying may be offered as a complimentary service for small areas. Effectiveness depends on weather, weed type, and timing of rainfall after application. No guarantee of outcome is given. Large-area spraying is quoted separately."
  - heading: Payment
    body: "Full payment is due upon completion of work unless otherwise agreed in writing. A booking deposit is required to secure your date and confirms acceptance of these terms. The deposit amount will be stated in the quotation."
